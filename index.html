<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>STPPL TNI Assessment</title>

<style>

body{
font-family:Arial;
background:#f0f2f5;
padding:20px;
}

.container{
max-width:900px;
margin:auto;
}

.card{
background:white;
padding:20px;
margin:15px 0;
border-radius:10px;
box-shadow:0 4px 6px rgba(0,0,0,0.1);
}

.skill-header{
background:#1e3a8a;
color:white;
padding:12px;
border-radius:6px;
margin-top:25px;
font-weight:bold;
}

button{
background:#1e3a8a;
color:white;
padding:15px;
border:none;
width:100%;
border-radius:8px;
cursor:pointer;
font-size:16px;
}

.progress{
position:sticky;
top:0;
background:white;
padding:10px;
border-bottom:2px solid #1e3a8a;
z-index:10;
font-weight:bold;
}

.option{
margin:10px 0;
}

</style>

</head>

<body>

<div class="container" id="login">

<div class="card">

<h2>STPPL TNI Assessment</h2>

<input id="user" placeholder="Enter Operator Name" style="width:96%;padding:12px">

<button onclick="start()">Start Assessment</button>

</div>

</div>


<div class="container" id="quiz" style="display:none">

<div class="progress" id="pBar">Answered: 0 / 0</div>

<div id="questions"></div>

<button onclick="submitAssessment()">Submit</button>

</div>

<script>
const URL = "https://script.google.com/macros/s/AKfycbxnF78tk1ulIxWWxhwjzJEQOKL18dDVqaZB05pV2lxEy6rxtfnWLTDgoZf7Wta4OXg/exec";
let qData = [];
let username = "";
let submitted = false;

async function start() {
    username = document.getElementById("user").value.trim();
    if (!username) { alert("Enter name"); return; }

    const res = await fetch(`${URL}?action=getQuestions&username=${encodeURIComponent(username)}`);
    qData = await res.json();

    if (qData.error) {
        alert(qData.error);
        return;
    }

    render();
    document.getElementById("login").style.display = "none";
    document.getElementById("quiz").style.display = "block";
}

function render() {
    const container = document.getElementById("questions");
    let html = "";
    qData.forEach((q, i) => {
        html += `
        <div class="card">
            <p><b>Q${i+1}</b> ${q.question}</p>
            ${q.options.map((opt) => `
                <label class="option" style="display:block">
                    <input type="radio" name="q${i}" 
                        data-score="${opt.score}" 
                        data-text="${opt.text}" 
                        onchange="progress()"> ${opt.text}
                </label>
            `).join('')}
        </div>`;
    });
    container.innerHTML = html;
}       
function progress() {
    const answered = document.querySelectorAll("input[type=radio]:checked").length;
    document.getElementById("pBar").innerText = `Answered: ${answered} / ${qData.length}`;
}

async function submitAssessment() {
    if (submitted) return;
    submitted = true;
    const results = [];

    qData.forEach((q, i) => {
        const selected = document.querySelector(`input[name="q${i}"]:checked`);
        results.push({
            userName: username,
            managerLevel: q.managerLevel, // Captured from AppScript JSON
            skillID: q.skillID,
            skillName: q.skillName,
            level: q.level,
            question: q.question,
            answer: selected ? selected.getAttribute("data-text") : "Not Answered",
            score: selected ? Number(selected.getAttribute("data-score")) : 0
        });
    });

    await fetch(URL, {
        method: "POST",
        mode: "no-cors",
        body: new URLSearchParams({ action: "saveResponses", data: JSON.stringify(results) })
    });
    alert("Submitted Successfully!");
    location.reload();
}
</script>
</body>
</html>
